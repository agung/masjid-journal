<svg xmlns="http://www.w3.org/2000/svg" viewBox="40 20 120 90">
  <style>
    .dome {
      fill: none;
      stroke: #1A5C3A;
      stroke-width: 4.5;
      stroke-linecap: round;
      transition: stroke 0.2s ease-in-out;
    }
    .circle {
      fill: #1A5C3A;
      transition: fill 0.2s ease-in-out;
    }
    .gold {
      fill: none;
      stroke: #C8A84B;
      stroke-width: 4.5;
      stroke-linecap: round;
    }
    @media (prefers-color-scheme: dark) {
      .dome {
        stroke: #3ECF8E;
      }
      .circle {
        fill: #3ECF8E;
      }
    }
  </style>
  <!-- Mosque Dome Mark -->
  <path class="dome" d="M60 75C65 55 80 40 100 40C120 40 135 55 140 75" />
  <!-- Antenna Stem -->
  <path class="dome" d="M100 40V31" />
  <!-- Top Circle -->
  <circle class="circle" cx="100" cy="27" r="4" />
  <!-- Golden/Connectivity Curves -->
  <path class="gold" d="M72 82C82 78 118 78 128 82" />
  <path class="gold" d="M66 91C78 86 122 86 134 91" />
  <path class="gold" d="M60 100C75 94 125 94 140 100" />
</svg>
